    <!-- Schema.org: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What makes La Palma & El Tucán coffee different from other specialty coffees?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We are one of the few coffee brands in the world that controls every step from seed to roast in a single location. Our coffee is roasted on-site at our farm in Zipacón, Colombia — just 50 meters from where it was cultivated. This allows us to design each roast profile based on intimate knowledge of every lot's terroir, fermentation, and drying process."
            }
          },
          {
            "@type": "Question",
            "name": "What is Geisha coffee and why is it so valuable?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Geisha (also spelled Gesha) is one of the rarest and most sought-after coffee varietals in the world, known for its extraordinary floral, citrus, and stone fruit flavor profile. Our Legendary Geisha scores 90+ on the SCA cupping scale. We maintain over 10,332 Geisha plants across 5 dedicated lots at altitudes between 1,650 and 1,800 meters above sea level."
            }
          },
          {
            "@type": "Question",
            "name": "What does roasted at origin mean?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Most specialty coffee brands source green beans from farms and roast them in a separate facility, often in a different country. Roasted at origin means our coffee is roasted right here on our farm in Zipacón, Colombia, on our Stronghold S8X roaster. The roaster sits just 50 meters from where the coffee trees grow, giving us unmatched control over quality."
            }
          },
          {
            "@type": "Question",
            "name": "What processing methods do you use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We use proprietary processing methods that define our coffees. The Lactic Process uses anaerobic fermentation with lactobacillus bacteria for intense sweetness. Bio-Innovation employs buried clay vessels and natural compost for 100-hour fermentation cycles. pH Clarity delivers pristine acidity and crystal-clear flavor definition. We also use traditional washed, honey, and natural processes."
            }
          },
          {
            "@type": "Question",
            "name": "How did your coffee win the World Barista Championship?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "In 2019, Jooyeon Jeon of South Korea won the World Barista Championship (WBC) using our Sidra varietal — a testament to the quality that emerges when the same team that nurtures the soil also controls the roast. Our green coffee has also commanded record prices, reaching $303 USD per pound — the highest price ever paid for Colombian coffee."
            }
          },
          {
            "@type": "Question",
            "name": "Do you ship specialty coffee to the United States?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, we ship our Colombian specialty coffee to all 50 US states. Every bag is roasted at origin in Zipacón, Colombia, ensuring you receive the freshest possible coffee with full traceability from our farm to your cup."
            }
          }
        ]
